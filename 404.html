<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>ГОШКРЯК — ASCII art</title>
    <meta name="description" content="ГОШКРЯК — ASCII-редактор. Без логина и водяных знаков." />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="theme-color" content="#0a0a0a" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

    <script>
      /* =====================================================================
         BINARY MODE — пресет «иллюстрация в стиле бинарного кода».
         ?binary в URL → window.__GK_PRESET__ подхватывается пропатченным
         бандлом при инициализации стейта (x.useState({...dt,...__GK_PRESET__})).
         Настройки режима правятся здесь, бандл перепатчивать не нужно.
         ===================================================================== */
      (function () {
        var q = new URLSearchParams(location.search);
        if (!q.has("binary")) return;
        window.__GK_BINARY__ = true;
        window.__GK_PRESET__ = {
          style: "dither2",
          ditherType: "floyd-steinberg",
          ditherStrength: 0.85,
          colorMode: "custom",
          customColor: "#ffffff",
          backgroundColor: "#2b32ff",
          charset: "binary",
          dither2ColorNum: 2,
          dither2PixelSize: 2,
          dither2AnimationEnabled: false,
          dither2MouseInteractionEnabled: false,
          contrast: 1.1
        };
      })();
    </script>

    <style>
      /* =====================================================================
         ГОШКРЯК — restrained monospace edition
         Только тема. Layout оригинальный (canvas слева, controls справа).
         ===================================================================== */

      :root, html, body {
        --accent: #ffffff !important;
        --gk-bg:    #0a0a0a;
        --gk-bg-2:  #131313;
        --gk-bg-3:  #1a1a1a;
        --gk-fg:    #e8e8e8;
        --gk-dim:   #6f6f6f;
        --gk-mute:  #404040;
        --gk-line:  #1c1c1c;
        --gk-line2: #262626;
        --gk-mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      }

      html, body {
        background: var(--gk-bg);
        color: var(--gk-fg);
      }
      ::selection { background: rgba(255,255,255,0.18); color: #fff; }

      /* Моноспейс на UI */
      body, button, input, textarea, select, label,
      .controls-panel, .controls-panel *,
      .left-mode-buttons, .left-mode-buttons *,
      .left-sidebar-controls, .left-sidebar-controls *,
      .header-brand, .header-action-row, .header-action-row *,
      .left-bottom-bar, .left-bottom-bar *,
      .export-popover, .export-popover *,
      .changelog-popover, .changelog-popover *,
      .creation-item, .creation-item *,
      .creations-header-button {
        font-family: var(--gk-mono) !important;
        letter-spacing: 0.01em;
      }

      /* ---- Кнопки режима над canvas ---- */
      .left-mode-button,
      .left-mode-icon-button,
      .left-mode-theme-toggle {
        background: rgba(20, 20, 20, 0.85) !important;
        border: 1px solid var(--gk-line2) !important;
        color: var(--gk-fg) !important;
        border-radius: 0 !important;
        font-family: var(--gk-mono) !important;
        font-size: 0.66rem !important;
        letter-spacing: 0.14em !important;
        backdrop-filter: blur(8px);
      }
      .left-mode-button:hover,
      .left-mode-icon-button:hover {
        border-color: var(--gk-fg) !important;
      }
      .left-mode-button.active,
      .left-mode-icon-button.active {
        background: var(--gk-fg) !important;
        color: var(--gk-bg) !important;
        border-color: var(--gk-fg) !important;
      }
      .left-mode-device-group {
        border: 1px solid var(--gk-line2) !important;
        background: rgba(20, 20, 20, 0.85) !important;
      }

      /* ---- Sidebar controls (top-right) ---- */
      .left-sidebar-controls > * { border-radius: 0 !important; }
      .left-sidebar-publish {
        position: relative !important;
        background: rgba(20, 20, 20, 0.85) !important;
        border: 1px solid var(--gk-line2) !important;
        color: var(--gk-dim) !important;
        text-shadow: none !important;
        opacity: 0.85 !important;
        cursor: not-allowed !important;
        pointer-events: none !important;
      }
      .left-sidebar-publish::after {
        content: "off";
        margin-left: 0.5em;
        font-size: 0.6em;
        letter-spacing: 0.14em;
        color: var(--gk-mute);
        text-transform: uppercase;
      }

      /* ---- Settings panel ---- */
      .controls-wrap {
        background: var(--gk-bg) !important;
        border-left: 1px solid var(--gk-line2) !important;
      }
      .controls-panel {
        border: none !important;
        padding: 1.25rem 1.5rem !important;
        gap: 0.55rem !important;
        background: transparent !important;
      }
      .controls-panel .control-section,
      .controls-panel .control-section-separated {
        padding: 0.65rem 0 !important;
        border-bottom: 1px solid var(--gk-line) !important;
      }
      .controls-panel .control-label,
      .controls-panel .control-row-head {
        color: var(--gk-dim) !important;
        font-size: 0.62rem !important;
        text-transform: uppercase !important;
        letter-spacing: 0.18em !important;
        font-weight: 500 !important;
      }
      .control-value,
      .control-text,
      .control-textarea,
      .control-select {
        color: var(--gk-fg) !important;
        background: var(--gk-bg-2) !important;
        border: 1px solid var(--gk-line2) !important;
        border-radius: 0 !important;
        font-family: var(--gk-mono) !important;
      }
      .control-text:focus,
      .control-textarea:focus,
      .control-select:focus {
        outline: none !important;
        border-color: var(--gk-fg) !important;
      }

      /* ---- Source / upload — НЕ трогаем .upload-input ---- */
      .upload-head .label {
        color: var(--gk-fg) !important;
        font-size: 0.7rem !important;
        text-transform: uppercase !important;
        letter-spacing: 0.18em !important;
      }
      .upload-controls-row { gap: 0.4rem !important; }
      .source-mode-button {
        background: var(--gk-bg-2) !important;
        color: var(--gk-fg) !important;
        border: 1px solid var(--gk-line2) !important;
        border-radius: 0 !important;
        font-family: var(--gk-mono) !important;
        font-size: 0.66rem !important;
        letter-spacing: 0.14em !important;
        text-transform: uppercase !important;
        padding: 0.5rem 0.85rem !important;
      }
      .source-mode-button.is-active {
        background: var(--gk-fg) !important;
        color: var(--gk-bg) !important;
        border-color: var(--gk-fg) !important;
      }
      .upload-dropzone {
        border: 1px dashed var(--gk-line2) !important;
        border-radius: 0 !important;
        background: var(--gk-bg) !important;
        min-height: 110px !important;
        padding: 1.2rem 1rem !important;
        cursor: pointer !important;
        transition: border-color 0.15s ease;
      }
      .upload-dropzone:hover { border-color: var(--gk-fg) !important; }
      .upload-dropzone.is-drag-active {
        border-color: var(--gk-fg) !important;
        border-style: solid !important;
      }
      .upload-hint {
        color: var(--gk-dim) !important;
        font-size: 0.62rem !important;
        letter-spacing: 0.06em !important;
      }
      .camera-device-empty {
        color: var(--gk-dim) !important;
        text-align: center;
      }

      /* ---- Header / branding ---- */
      .header-pro-badge {
        background: transparent !important;
        color: var(--gk-fg) !important;
        border: 1px solid var(--gk-line2) !important;
        border-radius: 0 !important;
        text-shadow: none !important;
        box-shadow: none !important;
        font-family: var(--gk-mono) !important;
        font-weight: 700 !important;
        letter-spacing: 0.18em !important;
        animation: none !important;
        padding: 0 6px !important;
      }
      .changelog-link-upgrade {
        color: var(--gk-fg) !important;
        text-shadow: none !important;
        font-weight: 500 !important;
        letter-spacing: 0.06em !important;
      }
      .header-action-row { gap: 8px; }
      .header-legal-link { color: var(--gk-dim) !important; }
      .header-legal-link:hover { color: var(--gk-fg) !important; }

      .save-status { color: var(--gk-dim) !important; }
      .save-status::before { content: ""; }

      /* ---- Export popover ---- */
      .export-popover {
        border: 1px solid var(--gk-line2) !important;
        border-radius: 0 !important;
        background: var(--gk-bg) !important;
        box-shadow: 0 16px 48px rgba(0, 0, 0, 0.7) !important;
      }
      .export-popover-head,
      .export-popover-head > * {
        color: var(--gk-fg) !important;
        text-shadow: none !important;
        font-family: var(--gk-mono) !important;
        letter-spacing: 0.18em !important;
        text-transform: uppercase !important;
      }
      .export-popover-disclaimer,
      .export-popover-note {
        border-left: 1px solid var(--gk-line2) !important;
        padding-left: 10px !important;
        color: var(--gk-dim) !important;
      }
      .export-code-block,
      .export-code-block-compact,
      .export-code-block-compact-html {
        border: 1px solid var(--gk-line) !important;
        border-radius: 0 !important;
        background: var(--gk-bg-2) !important;
      }

      /* ---- Скролл настроек: шире зона, видимый бегунок, плавно ---- */
      .controls-panel {
        scroll-behavior: smooth;
        overscroll-behavior: contain;
        scrollbar-gutter: stable;
        padding-bottom: 2.5rem !important;   /* воздух под последней настройкой */
      }
      .controls-panel::-webkit-scrollbar { width: 14px; }
      .controls-panel::-webkit-scrollbar-track { background: var(--gk-bg); }
      .controls-panel::-webkit-scrollbar-thumb {
        background: var(--gk-line2);
        border: 4px solid var(--gk-bg);   /* видимый, но с полями — легче попасть */
        border-radius: 0;
        min-height: 48px;                 /* бегунок не крошечный */
      }
      .controls-panel:hover::-webkit-scrollbar-thumb { background: var(--gk-dim); }
      /* Firefox */
      .controls-panel { scrollbar-width: auto; scrollbar-color: var(--gk-dim) var(--gk-bg); }

      /* ---- BINARY MODE кнопка в хедере ---- */
      .gk-binary-btn {
        display: inline-flex;
        align-items: center;
        padding: 3px 9px;
        border: 1px solid var(--gk-line2);
        color: var(--gk-fg);
        font-family: var(--gk-mono) !important;
        font-size: 0.62rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        text-decoration: none;
        cursor: pointer;
        white-space: nowrap;
      }
      .gk-binary-btn:hover { border-color: var(--gk-fg); }
      .gk-binary-btn.gk-active {
        background: #2b32ff;
        border-color: #2b32ff;
        color: #ffffff;
      }

      /* ---- TEXT-панель (наложение текста) ---- */
      .gk-text-panel {
        position: fixed;
        top: 4.2rem;
        right: 1.2rem;
        z-index: 40;
        width: 288px;
        max-width: calc(100vw - 2.4rem);
        background: var(--gk-bg);
        border: 1px solid var(--gk-line2);
        padding: 14px 15px 16px;
        font-family: var(--gk-mono) !important;
        color: var(--gk-fg);
        box-shadow: 0 18px 52px rgba(0, 0, 0, 0.72);
        display: none;
      }
      .gk-text-panel.gk-open { display: block; }
      .gk-tp-head {
        display: flex; justify-content: space-between; align-items: center;
        font-size: 0.66rem; letter-spacing: 0.18em; text-transform: uppercase;
        color: var(--gk-fg); margin-bottom: 12px;
      }
      .gk-tp-close { cursor: pointer; color: var(--gk-dim); border: none; background: none; font-family: var(--gk-mono); font-size: 0.8rem; }
      .gk-tp-close:hover { color: var(--gk-fg); }
      .gk-tp-label {
        display: block; font-size: 0.56rem; letter-spacing: 0.16em;
        text-transform: uppercase; color: var(--gk-dim); margin: 11px 0 5px;
      }
      .gk-text-panel textarea, .gk-text-panel select, .gk-text-panel input[type="text"] {
        width: 100%; box-sizing: border-box; background: var(--gk-bg-2);
        color: var(--gk-fg); border: 1px solid var(--gk-line2); border-radius: 0;
        font-family: var(--gk-mono) !important; font-size: 0.72rem; padding: 7px 8px; resize: vertical;
      }
      .gk-text-panel textarea:focus, .gk-text-panel select:focus, .gk-text-panel input:focus { outline: none; border-color: var(--gk-fg); }
      .gk-tp-row { display: flex; gap: 7px; }
      .gk-tp-row > * { flex: 1; }
      .gk-seg { display: flex; border: 1px solid var(--gk-line2); }
      .gk-seg button {
        flex: 1; background: var(--gk-bg-2); color: var(--gk-fg); border: none;
        border-right: 1px solid var(--gk-line2); padding: 7px 4px; cursor: pointer;
        font-family: var(--gk-mono) !important; font-size: 0.58rem; letter-spacing: 0.1em; text-transform: uppercase;
      }
      .gk-seg button:last-child { border-right: none; }
      .gk-seg button.gk-on { background: var(--gk-fg); color: var(--gk-bg); }
      .gk-tp-apply {
        width: 100%; margin-top: 14px; background: var(--gk-fg); color: var(--gk-bg);
        border: none; padding: 10px; cursor: pointer; font-family: var(--gk-mono) !important;
        font-size: 0.64rem; letter-spacing: 0.16em; text-transform: uppercase; font-weight: 700;
      }
      .gk-tp-apply:hover { background: #ffffff; }
      .gk-tp-hint { margin-top: 10px; font-size: 0.54rem; line-height: 1.5; color: var(--gk-mute); letter-spacing: 0.04em; }
      .gk-tp-status { margin-top: 8px; font-size: 0.56rem; color: var(--gk-dim); min-height: 0.8em; }
      .gk-range { width: 100%; accent-color: var(--gk-fg); }

      /* Живой оверлей текста поверх превью */
      .gk-text-overlay {
        position: absolute; inset: 0; z-index: 5; pointer-events: none;
        display: flex; padding: 6% 5%; box-sizing: border-box;
        font-family: "Helvetica Neue", Arial, sans-serif; font-weight: 700;
        text-align: center; white-space: pre-wrap; line-height: 1.1;
      }
      .gk-text-overlay.gk-pos-top { align-items: flex-start; justify-content: center; }
      .gk-text-overlay.gk-pos-center { align-items: center; justify-content: center; }
      .gk-text-overlay.gk-pos-bottom { align-items: flex-end; justify-content: center; }

      /* Подсказка горячих клавиш */
      .gk-hotkey-hint {
        position: fixed; left: 1.2rem; bottom: 1.2rem; z-index: 30;
        font-family: var(--gk-mono) !important; font-size: 0.54rem; letter-spacing: 0.08em;
        color: var(--gk-mute); pointer-events: none; user-select: none;
      }
      .gk-hotkey-hint b { color: var(--gk-dim); font-weight: 700; }
    </style>

    <script>
      /* =====================================================================
         ГОШКРЯК — расширения поверх React-приложения (бандл не трогаем):
         • кнопка BINARY (пресет ?binary)
         • кнопка/панель TEXT — наложение текста двумя способами:
             «в стиле» = текст впечатывается в картинку до дизера → цифры;
             «поверх»  = текст накладывается на готовый ASCII (превью + PNG).
         • горячие клавиши B / T / R / E
         ===================================================================== */
      (function () {
        var LS = "gk-text-opts";
        var opts = loadOpts();

        function loadOpts() {
          try { return Object.assign(base(), JSON.parse(localStorage.getItem(LS) || "{}")); }
          catch (e) { return base(); }
        }
        function base() {
          return { text: "", mode: "style", pos: "center", sizePct: 14, color: "#ffffff", stroke: true };
        }
        function saveOpts() { try { localStorage.setItem(LS, JSON.stringify(opts)); } catch (e) {} }

        /* ---- запомнить последний загруженный файл (для режима «в стиле») ---- */
        window.__GK_LAST_FILE__ = window.__GK_LAST_FILE__ || null;
        document.addEventListener("change", function (e) {
          var t = e.target;
          if (t && t.classList && t.classList.contains("upload-input") && t.files && t.files[0]) {
            if (/^image\//.test(t.files[0].type)) window.__GK_LAST_FILE__ = t.files[0];
          }
        }, true);

        function feedFile(file) {
          var input = document.querySelector(".upload-input");
          if (!input) return false;
          var dt = new DataTransfer();
          dt.items.add(file);
          input.files = dt.files;
          input.dispatchEvent(new Event("change", { bubbles: true }));
          return true;
        }
        function loadImg(file) {
          return new Promise(function (res, rej) {
            var u = URL.createObjectURL(file), im = new Image();
            im.onload = function () { URL.revokeObjectURL(u); res(im); };
            im.onerror = function () { URL.revokeObjectURL(u); rej(new Error("img")); };
            im.src = u;
          });
        }
        function drawText(ctx, w, h) {
          var lines = String(opts.text || "").split("\n");
          if (!lines.join("")) return;
          var size = Math.max(8, Math.round(h * opts.sizePct / 100));
          var lh = size * 1.16;
          ctx.font = '700 ' + size + 'px "Helvetica Neue", Helvetica, Arial, sans-serif';
          ctx.textAlign = "center"; ctx.textBaseline = "middle";
          var block = lh * (lines.length - 1);
          var y = opts.pos === "top" ? h * 0.13 + size / 2
                : opts.pos === "bottom" ? h * 0.87 - block - size / 2
                : h / 2 - block / 2;
          ctx.lineJoin = "round";
          ctx.lineWidth = Math.max(2, size * 0.16);
          ctx.strokeStyle = opts.color === "#ffffff" ? "#000000" : "#ffffff";
          for (var i = 0; i < lines.length; i++) {
            var ly = y + lh * i;
            if (opts.stroke) ctx.strokeText(lines[i], w / 2, ly);
            ctx.fillStyle = opts.color; ctx.fillText(lines[i], w / 2, ly);
          }
        }

        /* ---- «в стиле»: текст в картинку → переподать в загрузчик → дизер ---- */
        function applyStyle(status) {
          var f = window.__GK_LAST_FILE__;
          if (!f) { status("Сначала загрузи картинку в SOURCE"); return; }
          if (!String(opts.text || "").trim()) { status("Введи текст"); return; }
          status("Впечатываю текст…");
          loadImg(f).then(function (im) {
            var cap = 2200, w = im.naturalWidth, h = im.naturalHeight;
            var sc = Math.min(1, cap / Math.max(w, h)); w = Math.round(w * sc); h = Math.round(h * sc);
            var c = document.createElement("canvas"); c.width = w; c.height = h;
            var ctx = c.getContext("2d");
            ctx.drawImage(im, 0, 0, w, h);
            drawText(ctx, w, h);
            c.toBlob(function (b) {
              if (b && feedFile(new File([b], "gk-text.png", { type: "image/png" }))) status("Готово — текст пойдёт в цифры");
              else status("Не вышло переподать файл");
            }, "image/png");
          }).catch(function () { status("Не смог прочитать картинку"); });
        }

        /* ---- «поверх»: живой оверлей в превью + скачать PNG с текстом ---- */
        function overlayEl() { return document.querySelector(".gk-text-overlay"); }
        function refreshOverlay() {
          var stage = document.querySelector(".ascii-renderer-stage");
          if (!stage) return;
          var ov = overlayEl();
          var show = opts.mode === "overlay" && String(opts.text || "").trim();
          if (!show) { if (ov) ov.remove(); return; }
          if (!ov) { ov = document.createElement("div"); ov.className = "gk-text-overlay"; stage.appendChild(ov); }
          if (getComputedStyle(stage).position === "static") stage.style.position = "relative";
          ov.className = "gk-text-overlay gk-pos-" + opts.pos;
          ov.textContent = opts.text;
          ov.style.color = opts.color;
          ov.style.fontSize = "min(" + opts.sizePct + "vh, " + (opts.sizePct * 1.1) + "vw)";
          ov.style.textShadow = opts.stroke
            ? (opts.color === "#ffffff" ? "0 0 6px #000,0 0 2px #000" : "0 0 6px #fff,0 0 2px #fff") : "none";
        }
        function applyOverlay(status) {
          if (!String(opts.text || "").trim()) { status("Введи текст"); return; }
          var stage = document.querySelector(".ascii-renderer-stage");
          var cv = stage && stage.querySelector("canvas");
          if (!cv || !cv.width) { status("Нет превью — загрузи картинку"); return; }
          var c = document.createElement("canvas"); c.width = cv.width; c.height = cv.height;
          var ctx = c.getContext("2d");
          var bg = getComputedStyle(stage).backgroundColor;
          if (bg && bg !== "rgba(0, 0, 0, 0)" && bg !== "transparent") { ctx.fillStyle = bg; ctx.fillRect(0, 0, c.width, c.height); }
          ctx.drawImage(cv, 0, 0);
          drawText(ctx, c.width, c.height);
          c.toBlob(function (b) {
            if (!b) { status("Не вышло собрать PNG"); return; }
            var a = document.createElement("a"); a.href = URL.createObjectURL(b);
            a.download = "gk-overlay.png"; document.body.appendChild(a); a.click(); a.remove();
            setTimeout(function () { URL.revokeObjectURL(a.href); }, 1500);
            status("PNG с текстом скачан");
          }, "image/png");
        }

        /* ---- панель ---- */
        var panel = null;
        function buildPanel() {
          if (panel) return panel;
          panel = document.createElement("div");
          panel.className = "gk-text-panel";
          panel.innerHTML =
            '<div class="gk-tp-head"><span>Текст поверх</span><button class="gk-tp-close" title="Закрыть (T)">✕</button></div>' +
            '<div class="gk-seg" data-k="mode"><button data-v="style">В стиле · цифры</button><button data-v="overlay">Поверх</button></div>' +
            '<label class="gk-tp-label">Текст</label>' +
            '<textarea rows="2" data-k="text" placeholder="POWER OF THE&#10;CALENDAR"></textarea>' +
